# advisorai.gr – CI/CD (Section 8)
# CI: install, lint, test (if present) for frontend and backend
# CD: Backend → Docker → Cloud Run / Railway; Frontend → Vercel
# Prisma: migrate deploy on push to main

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ---------- CI: Backend ----------
  ci-backend:
    name: CI Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (type-check)
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  # ---------- CI: Frontend ----------
  ci-frontend:
    name: CI Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          CI: true
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://api.example.com' }}

      - name: Test
        run: npm run test

  # ---------- Prisma: migrate deploy (on push to main) ----------
  prisma-sync:
    name: Prisma Migrate Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Set DATABASE_URL (Supabase SSL)
        env:
          DB_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "::error::DATABASE_URL secret is not set. Add it in Settings → Secrets → Actions."
            exit 1
          fi
          # Supabase requires SSL; append sslmode=require if missing (fixes P1001)
          if echo "$DB_URL" | grep -q 'supabase\.co' && ! echo "$DB_URL" | grep -q 'sslmode='; then
            if echo "$DB_URL" | grep -q '?'; then
              echo "DATABASE_URL=${DB_URL}&sslmode=require" >> $GITHUB_ENV
            else
              echo "DATABASE_URL=${DB_URL}?sslmode=require" >> $GITHUB_ENV
            fi
          else
            echo "DATABASE_URL=$DB_URL" >> $GITHUB_ENV
          fi

      - name: Prisma migrate deploy
        run: npm run prisma:migrate:deploy

  # ---------- CD: Backend (Docker → Cloud) ----------
  cd-backend:
    name: CD Backend
    runs-on: ubuntu-latest
    needs: [ci-backend, prisma-sync]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry (GitHub)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata and build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: config/docker/Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/advisorai-backend:latest
            ghcr.io/${{ github.repository_owner }}/advisorai-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Optional: Deploy to Google Cloud Run (uncomment and set secrets)
      # - name: Deploy to Cloud Run
      #   uses: google-github-actions/deploy-cloudrun@v2
      #   with:
      #     service: advisorai-backend
      #     image: ghcr.io/${{ github.repository_owner }}/advisorai-backend:${{ github.sha }}
      #     region: ${{ secrets.GCP_REGION }}
      #     credentials: ${{ secrets.GCP_SA_KEY }}

      # Optional: Deploy to Railway (use Railway GitHub Action or CLI)
      # - name: Deploy to Railway
      #   uses: bervProject/railway-deploy@main
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: backend

  # ---------- CD: Frontend (Vercel) ----------
  # Runs only when VERCEL_TOKEN is set. If deploy fails with "Unexpected error": set NEXT_PUBLIC_API_URL in Vercel → Project → Settings → Env Vars, then Redeploy.
  cd-frontend:
    name: CD Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [ci-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Check Vercel secrets
        id: vercel-check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
            echo "::notice::Skipping Vercel deploy: add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID in Settings → Secrets → Actions to enable."
          fi

      - name: Deploy to Vercel
        if: steps.vercel-check.outputs.deploy == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          # Pass build env so Next.js build has NEXT_PUBLIC_API_URL (set in repo vars or leave default)
          vercel-args: '--prod'
