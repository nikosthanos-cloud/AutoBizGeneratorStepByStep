# advisorai.gr – CI/CD (Section 8)
# CI: install, lint, test (if present) for frontend and backend
# CD: Backend → Docker → Cloud Run / Railway; Frontend → Vercel
# Prisma: migrate deploy on push to main

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ---------- CI: Backend ----------
  ci-backend:
    name: CI Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (type-check)
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  # ---------- CI: Frontend ----------
  ci-frontend:
    name: CI Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://api.example.com' }}

      - name: Test
        run: npm run test

  # ---------- Prisma: migrate deploy (on push to main) ----------
  prisma-sync:
    name: Prisma Migrate Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ---------- CD: Backend (Docker → Cloud) ----------
  cd-backend:
    name: CD Backend
    runs-on: ubuntu-latest
    needs: [ci-backend, prisma-sync]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry (GitHub)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata and build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: config/docker/Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/advisorai-backend:latest
            ghcr.io/${{ github.repository_owner }}/advisorai-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Optional: Deploy to Google Cloud Run (uncomment and set secrets)
      # - name: Deploy to Cloud Run
      #   uses: google-github-actions/deploy-cloudrun@v2
      #   with:
      #     service: advisorai-backend
      #     image: ghcr.io/${{ github.repository_owner }}/advisorai-backend:${{ github.sha }}
      #     region: ${{ secrets.GCP_REGION }}
      #     credentials: ${{ secrets.GCP_SA_KEY }}

      # Optional: Deploy to Railway (use Railway GitHub Action or CLI)
      # - name: Deploy to Railway
      #   uses: bervProject/railway-deploy@main
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: backend

  # ---------- CD: Frontend (Vercel) ----------
  cd-frontend:
    name: CD Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [ci-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'
